name: Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate Repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install test dependencies
        run: pip install pytest

      - name: Install workflow lint tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Run repository validator
        run: bash scripts/validate.sh

      - name: Check shell syntax
        run: bash -n install.sh claudecfg/install.sh claudecfg/hooks/*.sh scripts/*.sh

      - name: Check key JSON files
        run: |
          jq empty claudecfg/settings.json
          jq empty tests/hooks/cases.json
          jq empty bench/tasks/*.json
          jq empty bench/schema/*.json

      - name: Run all pytest tests
        run: python -m pytest tests/ -v

      - name: Check whitespace errors
        run: git diff --check
