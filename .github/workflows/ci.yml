name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Show runtime versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm install

      - name: Validate canonical manifest
        run: npm run check

      - name: Generate agent packs
        run: npm run build

      - name: Run test suite
        run: npm test

      - name: Run smoke flow
        run: npm run smoke

      - name: Upload generated dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agent-kit-dist
          path: dist/
          if-no-files-found: error

      - name: Upload packaged CLI project
        run: npm run package:cli

      - name: Upload packaged CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-kit-package
          path: dist-build/agent-kit-package/
          if-no-files-found: error

