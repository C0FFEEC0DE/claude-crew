name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_RELEASE_TAG"
          else
            TAG="$GITHUB_REF_NAME"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Validate, build, test, and smoke
        run: |
          npm run check
          npm run build
          npm test
          npm run smoke
          npm run package:cli

      - name: Create release archives
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          mkdir -p release-assets
          tar -czf "release-assets/agent-kit-${RELEASE_TAG}-dist.tar.gz" dist
          tar -czf "release-assets/agent-kit-${RELEASE_TAG}-package.tar.gz" dist-build/agent-kit-package

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
          gh release create "$RELEASE_TAG" \
            --title "agent-kit $RELEASE_TAG" \
            --generate-notes
          gh release upload "$RELEASE_TAG" release-assets/* --clobber

