name: Hook Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  hook-behavior:
    name: Hook Behavior Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Run hook test harness
        run: bash scripts/test-hooks.sh
