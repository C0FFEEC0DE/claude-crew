name: Real Claude Code

on:
  push:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Prompt for Claude Code"
        required: true
        type: string
      max_turns:
        description: "Maximum Claude Code turns"
        required: false
        default: "8"
        type: string
      model:
        description: "Optional OpenRouter model override"
        required: false
        default: ""
        type: string

jobs:
  claude-code-openrouter:
    name: Real Claude Code via OpenRouter
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: real-claude-code-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve model
        id: cfg
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_MAX_TURNS: ${{ inputs.max_turns }}
          INPUT_PROMPT: ${{ inputs.prompt }}
          INPUT_MODEL: ${{ inputs.model }}
          VAR_MODEL: ${{ vars.OPENROUTER_MODEL }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          GH_SHA: ${{ github.sha }}
        run: |
          model="${INPUT_MODEL:-${VAR_MODEL:-z-ai/glm-4.7-flash}}"
          if [ -z "$model" ]; then
            model="z-ai/glm-4.7-flash"
          fi
          echo "model=$model" >> "$GITHUB_OUTPUT"

          max_turns="${INPUT_MAX_TURNS:-8}"
          if [ -z "$max_turns" ]; then
            max_turns="8"
          fi
          echo "max_turns=$max_turns" >> "$GITHUB_OUTPUT"

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            prompt="$INPUT_PROMPT"
          else
            baseline="${PUSH_BEFORE_SHA:-}"
            if [ -z "$baseline" ] || [ "$baseline" = "0000000000000000000000000000000000000000" ]; then
              if git rev-parse --verify "${GH_SHA}^" >/dev/null 2>&1; then
                baseline="$(git rev-parse "${GH_SHA}^")"
              else
                baseline="$GH_SHA"
              fi
            fi
            prompt="Inspect the repository changes introduced between ${baseline} and ${GH_SHA}. Use the installed ~/.claude profile from this repository. Review the changed files, run the relevant validation or test commands when needed, and make only minimal fixes that are justified by the diff. Do not do release or deploy work. Leave the resulting workspace diff for artifact collection."
          fi
          {
            echo "prompt<<__PROMPT__"
            echo "$prompt"
            echo "__PROMPT__"
          } >> "$GITHUB_OUTPUT"

      - name: Install Claude configuration
        shell: bash
        run: |
          mkdir -p "$HOME/.claude"
          cp -R claudecfg/* "$HOME/.claude/"
          find "$HOME/.claude/hooks" -type f -name "*.sh" -exec chmod +x {} \;
          {
            echo "## Real Claude Code Context"
            echo ""
            echo "- OpenRouter model: \`${{ steps.cfg.outputs.model }}\`"
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo "- Max turns: \`${{ steps.cfg.outputs.max_turns }}\`"
            echo "- Prompt:"
            echo ""
            echo '```text'
            echo "${{ steps.cfg.outputs.prompt }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install Claude Code CLI
        shell: bash
        run: |
          node --version
          npm --version
          npm install -g @anthropic-ai/claude-code
          claude --version

      - name: Run Claude Code
        shell: bash
        env:
          PROMPT: ${{ steps.cfg.outputs.prompt }}
          CLAUDE_MODEL: ${{ steps.cfg.outputs.model }}
          MAX_TURNS: ${{ steps.cfg.outputs.max_turns }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_BASE_URL: https://openrouter.ai/api
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY: ""
        run: |
          if [ -z "${OPENROUTER_API_KEY:-}" ]; then
            echo "OPENROUTER_API_KEY secret is required" >&2
            exit 1
          fi
          bash scripts/run-real-claude-code.sh

      - name: Collect workspace diff
        if: always()
        shell: bash
        run: |
          git status --short > claude-status.txt
          git diff --stat > claude-diffstat.txt || true
          git diff > claude-workspace.patch || true
          {
            echo ""
            echo "## Real Claude Code Output"
            echo ""
            echo '```text'
            cat claude-status.txt
            echo '```'
            echo ""
            echo "### Diff Stat"
            echo ""
            echo '```text'
            cat claude-diffstat.txt
            echo '```'
            if [ -f claude-result.txt ]; then
              echo ""
              echo "### Claude Result"
              echo ""
              echo '```text'
              cat claude-result.txt
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Claude artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-claude-code-${{ github.run_id }}
          path: |
            claude-status.txt
            claude-diffstat.txt
            claude-workspace.patch
            claude-result.json
            claude-result.txt
            claude-stderr.log
            claude-stderr-tail.txt
